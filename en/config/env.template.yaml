# 08-idl2python-parity — execution profile template
#
# Usage: copy this file to config/env.yaml, then fill it in for your own environment.
#   cp config/env.template.yaml config/env.yaml
# config/env.yaml is a .gitignore target (principle: do not include host/account/site paths).
# The harness operates with each user's own IDL license (both a full and a 90-day trial license work).

profile: my-site

exec:
  # local: when the agent session runs directly on the host where IDL is installed (default, recommended)
  # ssh:   when running on a different host — wrap every execution command in `ssh {host} "..."`
  mode: local
  host: ""                      # user@host when mode=ssh

idl:
  bin: idl                      # absolute path if not on PATH (e.g., /usr/local/bin/idl)
  idl_dir: ""                   # e.g., /usr/local/idl/idl86 (empty = system default)
  ssw: ""                       # SSW root, only when the target code uses SolarSoft. Empty = run with pure IDL
  ssw_instr: "aia hmi"          # instrument list when using SSW
  launcher: tools/run_idl_headless.csh
  timeout_s: 1800
  license_check: "idl -e 'print, !version'"   # verify license reachability before oracle execution

python:
  conda_sh: ~/anaconda3/etc/profile.d/conda.sh   # "" if not using conda (python must be on PATH)
  conda_env: base
  # required packages: numpy scipy astropy pyyaml (+ sunpy aiapy drms matplotlib scikit-image — depending on the target code)
  # regression tests (Phase 6): pytest

paths:
  harness_root: ""              # absolute path of this harness checkout
  data_cache: "{harness_root}/_cache/data"
  oracle_cache: "{harness_root}/_cache/oracle"

limits:
  fix_loop_max: 5               # parity fix loop (re-run Python only)
  probe_refine_max: 2           # probe refinement (requires IDL re-instrumentation)
  same_divergence_max: 3        # same probe, same divergence repeated → escalation
  review_revise_max: 2
  disk_warn_gb: 5               # notify in advance if expected outputs exceed this

notes:
  - GPU not required (both IDL and the comparator are CPU)
  - The oracle cache is append-only; cleanup (deletion) is done only by the user
