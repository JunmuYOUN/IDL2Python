# 수치·좌표 패리티 정책 템플릿
# 프로젝트 시작 시 {작업경로}/policy.yaml 로 복사해 채우고 G1 승인을 받는다.
# 스키마/의미: .claude/skills/parity-protocol/skill.md §2, §3

# 배열 축 정책 — 반드시 프로젝트당 하나로 통일 (parity-protocol §3)
#   logical: Python이 IDL 논리 인덱스 a[i,j]를 보존 → 비교기가 readsav 축을 역순 정렬
#   memory : Python이 numpy 자연 축(뒤집힌 shape)을 사용 → readsav 결과 그대로 비교
orientation: logical

nan_equal: true          # 양쪽 다 NaN이면 일치로 간주
dtype_strict: false      # true면 dtype 불일치 즉시 FAIL (기본: 경고만)

defaults:
  float:  {metric: allclose, rtol: 1.0e-5, atol: 1.0e-6}    # float32 기준
  double: {metric: allclose, rtol: 1.0e-10, atol: 1.0e-12}
  int:    {metric: exact}
  byte_mask: {metric: iou, min_iou: 0.999}                  # 0/1 배열 자동 감지

# probe/변수별 오버라이드 (probe 계획과 함께 채운다)
# 최종 산출물의 지표·임계값: analyzer가 코드 특성을 근거로 제안 → G1에서 사용자가 확정
# (human-in-the-loop). 확정 전 임의 수치로 PASS 선언 금지.
checkpoints: {}
#  "01_input":
#    "*": {metric: allclose, rtol: 0, atol: 0}     # 입력은 정확 일치가 정상
#  "99_final":
#    seg_map: {metric: labels, min_iou: 0.99}      # 라벨 순열 허용

# 승인된 불일치 — 반드시 (원인, 완화 기준, 사용자 승인)을 갖춘다
waivers: []
#  - checkpoint: "07_rot"
#    var: img_rot
#    reason: "IDL cubic=-0.5 (cubic convolution) vs scipy spline 커널 차이 — 사용자 승인 YYYY-MM-DD"
#    relaxed: {metric: allclose, rtol: 1.0e-3, atol: 1.0e-4}
