# 08-idl2python-parity — 실행 프로파일 템플릿
#
# 사용법: 이 파일을 config/env.yaml 로 복사한 뒤 자기 환경에 맞게 채운다.
#   cp config/env.template.yaml config/env.yaml
# config/env.yaml 은 .gitignore 대상이다 (호스트/계정/사이트 경로 포함 금지 원칙).
# 하네스는 사용자 각자의 IDL 라이선스(정식/90일 트라이얼 모두 가능)로 동작한다.

profile: my-site

exec:
  # local: 에이전트 세션이 IDL이 설치된 호스트에서 직접 구동될 때 (기본 권장)
  # ssh:   다른 호스트에서 구동될 때 — 모든 실행 명령을 `ssh {host} "..."` 로 감싼다
  mode: local
  host: ""                      # mode=ssh 일 때 user@host

idl:
  bin: idl                      # PATH에 없으면 절대경로 (예: /usr/local/bin/idl)
  idl_dir: ""                   # 예: /usr/local/idl/idl86 (비우면 시스템 기본)
  ssw: ""                       # 대상 코드가 SolarSoft를 쓸 때만 SSW 루트. 비우면 순수 IDL로 실행
  ssw_instr: "aia hmi"          # SSW 사용 시 계측기 목록
  launcher: tools/run_idl_headless.csh
  timeout_s: 1800
  license_check: "idl -e 'print, !version'"   # 오라클 실행 전 라이선스 도달 확인

python:
  conda_sh: ~/anaconda3/etc/profile.d/conda.sh   # conda 미사용 시 "" (python이 PATH에 있어야 함)
  conda_env: base
  # 필요 패키지: numpy scipy astropy pyyaml (+ sunpy aiapy drms matplotlib scikit-image — 대상 코드에 따라)
  # 회귀 테스트(Phase 6): pytest

paths:
  harness_root: ""              # 이 하네스 체크아웃의 절대 경로
  data_cache: "{harness_root}/_cache/data"
  oracle_cache: "{harness_root}/_cache/oracle"

limits:
  fix_loop_max: 5               # 패리티 수정 루프 (Python만 재실행)
  probe_refine_max: 2           # probe 세분화 (IDL 재계측 필요)
  same_divergence_max: 3        # 동일 probe 동일 발산 반복 → 에스컬레이션
  review_revise_max: 2
  disk_warn_gb: 5               # 예상 산출물이 이를 넘으면 사전 고지

notes:
  - GPU 불필요 (IDL/비교기 모두 CPU)
  - 오라클 캐시는 append-only, 정리(삭제)는 사용자만
